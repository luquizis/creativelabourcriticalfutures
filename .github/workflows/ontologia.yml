name: CLCF Ontologia

on:
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:

permissions:
  pages: write
  id-token: write
  contents: read

jobs:
  scrape-e-publicar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install requests beautifulsoup4 lxml

      - name: Executar scraper
        run: python scraper_profundo.py

      - name: Preparar GitHub Pages
        run: |
          mkdir -p _site
          cp dashboard.html _site/index.html
          cp clcf_ontologia.json _site/clcf_ontologia.json

      - name: Upload para Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: scrape-e-publicar
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
