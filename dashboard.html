<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLCF — Constelação de Pesquisa</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
  :root {
    --bg: #0a0a12;
    --surface: #12121e;
    --surface2: #1a1a2e;
    --border: rgba(255,255,255,0.08);
    --accent: #7c6af7;
    --accent2: #4ecdc4;
    --accent3: #f7c948;
    --accent4: #f76c6c;
    --text: #e8e8f0;
    --text2: #9090a8;
    --glow: rgba(124,106,247,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 100;
  }
  header h1 {
    font-size: 15px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.05em;
  }
  header p { font-size: 12px; color: var(--text2); }

  .stats {
    display: flex; gap: 20px;
  }
  .stat { text-align: center; }
  .stat .n { font-size: 20px; font-weight: 700; color: var(--accent); }
  .stat .l { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 2px;
    padding: 0 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .tab {
    padding: 10px 20px;
    font-size: 13px;
    color: var(--text2);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    user-select: none;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── MAIN LAYOUT ── */
  .main {
    flex: 1;
    overflow: hidden;
    display: flex;
    position: relative;
  }

  .panel {
    display: none;
    width: 100%;
    height: 100%;
  }
  .panel.active { display: flex; }

  /* ── GRAFO ── */
  #panel-grafo {
    position: relative;
  }

  #grafo-svg {
    width: 100%;
    height: 100%;
    cursor: grab;
  }
  #grafo-svg:active { cursor: grabbing; }

  /* Sidebar de detalhes */
  .sidebar {
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 300px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    padding: 20px;
    overflow-y: auto;
    transform: translateX(100%);
    transition: transform 0.3s ease;
    z-index: 10;
  }
  .sidebar.open { transform: translateX(0); }
  .sidebar h2 { font-size: 15px; margin-bottom: 6px; color: var(--accent); }
  .sidebar .cargo { font-size: 12px; color: var(--text2); margin-bottom: 14px; }
  .sidebar .bio { font-size: 12px; line-height: 1.7; color: var(--text2); margin-bottom: 14px; }
  .sidebar .close-btn {
    position: absolute; top: 14px; right: 14px;
    background: none; border: none; color: var(--text2);
    font-size: 18px; cursor: pointer;
  }
  .sidebar .close-btn:hover { color: var(--text); }
  .tag-list { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 14px; }
  .tag {
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 11px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--accent2);
  }
  .sidebar a {
    display: inline-block;
    margin-top: 8px;
    font-size: 12px;
    color: var(--accent);
    text-decoration: none;
  }
  .sidebar a:hover { text-decoration: underline; }
  .sidebar .section-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text2);
    margin: 12px 0 6px;
  }

  /* Controles do grafo */
  .grafo-controls {
    position: absolute;
    left: 16px; top: 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    z-index: 10;
  }
  .ctrl-btn {
    width: 32px; height: 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .ctrl-btn:hover { background: var(--surface2); }

  .filtros {
    position: absolute;
    left: 16px; bottom: 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    max-width: 380px;
    z-index: 10;
  }
  .filtro-btn {
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text2);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filtro-btn:hover, .filtro-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .legenda {
    position: absolute;
    right: 16px; bottom: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 11px;
    z-index: 10;
  }
  .legenda-item {
    display: flex; align-items: center; gap: 7px;
    margin-bottom: 5px; color: var(--text2);
  }
  .legenda-dot {
    width: 10px; height: 10px;
    border-radius: 50%; flex-shrink: 0;
  }

  /* ── TIMELINE ── */
  #panel-timeline {
    flex-direction: column;
    overflow: hidden;
  }
  .timeline-header {
    padding: 16px 24px 8px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .timeline-filtro {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text2);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .timeline-filtro.active, .timeline-filtro:hover {
    background: var(--accent2);
    border-color: var(--accent2);
    color: var(--bg);
  }
  .timeline-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 0 24px 24px;
  }
  .timeline-scroll::-webkit-scrollbar { width: 4px; }
  .timeline-scroll::-webkit-scrollbar-track { background: transparent; }
  .timeline-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .timeline-item {
    display: flex;
    gap: 16px;
    margin-bottom: 2px;
    opacity: 0;
    transform: translateX(-10px);
    animation: slideIn 0.4s forwards;
  }
  @keyframes slideIn {
    to { opacity: 1; transform: translateX(0); }
  }

  .tl-left {
    width: 90px;
    flex-shrink: 0;
    text-align: right;
    padding-top: 14px;
  }
  .tl-data { font-size: 11px; color: var(--text2); }

  .tl-linha {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-shrink: 0;
  }
  .tl-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    margin-top: 16px;
    flex-shrink: 0;
    box-shadow: 0 0 8px currentColor;
  }
  .tl-bar {
    width: 2px;
    flex: 1;
    background: var(--border);
    margin-top: 4px;
  }

  .tl-card {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    margin: 8px 0;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  .tl-card:hover {
    border-color: var(--accent);
    background: var(--surface2);
  }
  .tl-tipo {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 4px;
  }
  .tl-titulo { font-size: 13px; font-weight: 500; margin-bottom: 6px; }
  .tl-temas { display: flex; flex-wrap: wrap; gap: 4px; }
  .tl-tema {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    background: var(--surface2);
    color: var(--text2);
    border: 1px solid var(--border);
  }

  /* ── NUVEM ── */
  #panel-nuvem {
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  #nuvem-svg {
    width: 100%;
    height: 100%;
  }

  /* ── LOADING ── */
  .loading {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    gap: 16px;
  }
  .loading h2 { color: var(--accent); font-size: 18px; }
  .loading p { color: var(--text2); font-size: 13px; }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    background: rgba(247,108,108,0.1);
    border: 1px solid var(--accent4);
    border-radius: 8px;
    padding: 16px 24px;
    color: var(--accent4);
    font-size: 13px;
    max-width: 500px;
    text-align: center;
    margin-top: 8px;
  }
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <h2>CLCF Constelação</h2>
  <p id="loading-msg">Carregando ontologia...</p>
</div>

<header>
  <div>
    <h1>Creative Labour & Critical Futures — Constelação de Pesquisa</h1>
    <p>Ontologia interativa • Mapeamento temático e relacional</p>
  </div>
  <div class="stats" id="stats"></div>
</header>

<div class="tabs">
  <div class="tab active" data-tab="grafo">🌐 Grafo de Rede</div>
  <div class="tab" data-tab="timeline">📅 Timeline</div>
  <div class="tab" data-tab="nuvem">☁️ Nuvem de Temas</div>
</div>

<div class="main">

  <!-- PAINEL 1: GRAFO -->
  <div class="panel active" id="panel-grafo">
    <svg id="grafo-svg"></svg>

    <div class="grafo-controls">
      <button class="ctrl-btn" id="btn-zoom-in" title="Zoom +">+</button>
      <button class="ctrl-btn" id="btn-zoom-out" title="Zoom −">−</button>
      <button class="ctrl-btn" id="btn-reset" title="Resetar">⌂</button>
    </div>

    <div class="filtros" id="filtros-grafo">
      <button class="filtro-btn active" data-filtro="todos">Todos</button>
      <button class="filtro-btn" data-filtro="pessoa">Pessoas</button>
      <button class="filtro-btn" data-filtro="tema">Temas</button>
      <button class="filtro-btn" data-filtro="temas_comuns">Temas comuns</button>
      <button class="filtro-btn" data-filtro="coautoria">Co-autorias</button>
    </div>

    <div class="legenda">
      <div class="legenda-item"><div class="legenda-dot" style="background:#7c6af7"></div> Pesquisador</div>
      <div class="legenda-item"><div class="legenda-dot" style="background:#4ecdc4"></div> Tema</div>
      <div class="legenda-item"><div class="legenda-dot" style="background:#f7c948;border-radius:3px"></div> Diretor(a)</div>
    </div>

    <div class="sidebar" id="sidebar">
      <button class="close-btn" id="sidebar-close">×</button>
      <div id="sidebar-content"></div>
    </div>
  </div>

  <!-- PAINEL 2: TIMELINE -->
  <div class="panel" id="panel-timeline">
    <div class="timeline-header" id="timeline-filtros"></div>
    <div class="timeline-scroll" id="timeline-lista"></div>
  </div>

  <!-- PAINEL 3: NUVEM -->
  <div class="panel" id="panel-nuvem">
    <svg id="nuvem-svg"></svg>
  </div>

</div>

<script>
// ─────────────────────────────────────────────
// ESTADO GLOBAL
// ─────────────────────────────────────────────
let DADOS = null;
let grafoSimulacao = null;
let grafoZoom = null;
let filtroAtivo = "todos";

// ─────────────────────────────────────────────
// CORES
// ─────────────────────────────────────────────
const CORES = {
  pessoa: "#7c6af7",
  tema: "#4ecdc4",
  diretor: "#f7c948",
  "Blog Post": "#f76c6c",
  "Project": "#7c6af7",
  "Speaker Series": "#4ecdc4",
  "Resource": "#f7c948",
};

const CORES_ARESTA = {
  temas_comuns: "rgba(124,106,247,0.35)",
  coautoria: "rgba(247,201,72,0.5)",
  tema_comum: "rgba(78,205,196,0.2)",
};

// ─────────────────────────────────────────────
// CARREGAMENTO
// ─────────────────────────────────────────────
async function carregar() {
  const msg = document.getElementById("loading-msg");
  try {
    msg.textContent = "Lendo clcf_ontologia.json...";
    const res = await fetch("clcf_ontologia.json");
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    DADOS = await res.json();

    msg.textContent = "Construindo grafo...";
    await new Promise(r => setTimeout(r, 50));
    renderStats();
    renderGrafo();

    msg.textContent = "Construindo timeline...";
    await new Promise(r => setTimeout(r, 50));
    renderTimeline();

    msg.textContent = "Construindo nuvem...";
    await new Promise(r => setTimeout(r, 50));
    renderNuvem();

    document.getElementById("loading").style.display = "none";
  } catch (e) {
    msg.textContent = "";
    document.getElementById("loading").innerHTML = `
      <div class="spinner" style="border-top-color:#f76c6c"></div>
      <h2 style="color:#f76c6c">Arquivo não encontrado</h2>
      <div class="error-msg">
        Coloque <strong>clcf_ontologia.json</strong> na mesma pasta que este HTML.<br><br>
        Execute primeiro: <code>python scraper_profundo.py</code>
      </div>`;
  }
}

// ─────────────────────────────────────────────
// STATS
// ─────────────────────────────────────────────
function renderStats() {
  const m = DADOS.meta;
  document.getElementById("stats").innerHTML = `
    <div class="stat"><div class="n">${m.n_pessoas}</div><div class="l">Pesquisadores</div></div>
    <div class="stat"><div class="n">${m.n_conteudos}</div><div class="l">Conteúdos</div></div>
    <div class="stat"><div class="n">${m.n_temas}</div><div class="l">Temas</div></div>
    <div class="stat"><div class="n">${m.n_conexoes}</div><div class="l">Conexões</div></div>
  `;
}

// ─────────────────────────────────────────────
// GRAFO DE REDE (D3 Force)
// ─────────────────────────────────────────────
function renderGrafo() {
  const svg = d3.select("#grafo-svg");
  svg.selectAll("*").remove();

  const W = document.getElementById("grafo-svg").clientWidth;
  const H = document.getElementById("grafo-svg").clientHeight;

  const g = svg.append("g");

  // Zoom
  grafoZoom = d3.zoom()
    .scaleExtent([0.2, 4])
    .on("zoom", e => g.attr("transform", e.transform));
  svg.call(grafoZoom);

  // Filtra nós e arestas conforme filtro ativo
  const nos = filtrarNos(DADOS.nos);
  const nosIds = new Set(nos.map(n => n.id));
  const arestas = DADOS.arestas.filter(e =>
    nosIds.has(e.source) && nosIds.has(e.target) &&
    (filtroAtivo === "todos" || e.tipo === filtroAtivo || filtroAtivo === "pessoa" || filtroAtivo === "tema")
  );

  // Simulação de forças
  grafoSimulacao = d3.forceSimulation(nos)
    .force("link", d3.forceLink(arestas).id(d => d.id).distance(d => d.tipo === "tema_comum" ? 80 : 120))
    .force("charge", d3.forceManyBody().strength(d => d.tipo === "tema" ? -80 : -200))
    .force("center", d3.forceCenter(W / 2, H / 2))
    .force("collision", d3.forceCollide().radius(d => raioDo(d) + 8));

  // Arestas
  const link = g.append("g").selectAll("line")
    .data(arestas)
    .join("line")
    .attr("stroke", d => CORES_ARESTA[d.tipo] || "rgba(255,255,255,0.1)")
    .attr("stroke-width", d => Math.min(d.peso || 1, 4))
    .attr("stroke-dasharray", d => d.tipo === "coautoria" ? "4 3" : null);

  // Nós
  const node = g.append("g").selectAll("g")
    .data(nos)
    .join("g")
    .attr("class", "no")
    .style("cursor", "pointer")
    .call(d3.drag()
      .on("start", (e, d) => { if (!e.active) grafoSimulacao.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on("drag",  (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on("end",   (e, d) => { if (!e.active) grafoSimulacao.alphaTarget(0); d.fx = null; d.fy = null; })
    )
    .on("click", (e, d) => abrirSidebar(d, nos, arestas));

  // Círculos
  node.append("circle")
    .attr("r", d => raioDo(d))
    .attr("fill", d => corDo(d))
    .attr("fill-opacity", 0.9)
    .attr("stroke", d => corDo(d))
    .attr("stroke-width", 2)
    .attr("stroke-opacity", 0.4);

  // Labels
  node.append("text")
    .text(d => labelCurto(d))
    .attr("text-anchor", "middle")
    .attr("dy", d => raioDo(d) + 13)
    .attr("font-size", d => d.tipo === "pessoa" ? "11px" : "10px")
    .attr("fill", d => d.tipo === "pessoa" ? "#e8e8f0" : "#9090a8")
    .attr("pointer-events", "none");

  // Pulso nos pesquisadores principais
  node.filter(d => d.tipo === "pessoa" && d.grupo && d.grupo.includes("Operations"))
    .append("circle")
    .attr("r", d => raioDo(d) + 4)
    .attr("fill", "none")
    .attr("stroke", "#f7c948")
    .attr("stroke-width", 1.5)
    .attr("stroke-opacity", 0.5)
    .attr("stroke-dasharray", "4 3");

  // Tick
  grafoSimulacao.on("tick", () => {
    link
      .attr("x1", d => d.source.x)
      .attr("y1", d => d.source.y)
      .attr("x2", d => d.target.x)
      .attr("y2", d => d.target.y);
    node.attr("transform", d => `translate(${d.x},${d.y})`);
  });

  // Controles
  document.getElementById("btn-zoom-in").onclick  = () => svg.transition().call(grafoZoom.scaleBy, 1.4);
  document.getElementById("btn-zoom-out").onclick = () => svg.transition().call(grafoZoom.scaleBy, 0.7);
  document.getElementById("btn-reset").onclick    = () => svg.transition().call(grafoZoom.transform, d3.zoomIdentity.translate(W/2, H/2).scale(0.9).translate(-W/2, -H/2));
}

function raioDo(d) {
  if (d.tipo === "tema") return Math.max(6, Math.min(20, (d.freq || 1) * 2.5));
  if (d.tipo === "pessoa") return d.n_posts > 3 ? 18 : d.n_posts > 0 ? 14 : 10;
  return 8;
}

function corDo(d) {
  if (d.tipo === "tema") return CORES.tema;
  if (d.grupo && d.grupo.includes("Operations")) return CORES.diretor;
  return CORES.pessoa;
}

function labelCurto(d) {
  if (d.tipo === "tema") return d.label.length > 18 ? d.label.slice(0, 16) + "…" : d.label;
  const partes = d.label.split(" ");
  return partes[partes.length - 1]; // sobrenome
}

function filtrarNos(nos) {
  if (filtroAtivo === "todos") return nos;
  if (filtroAtivo === "pessoa") return nos.filter(n => n.tipo === "pessoa");
  if (filtroAtivo === "tema") return nos.filter(n => n.tipo === "tema");
  // outros filtros mostram todos os nós mas filtram arestas
  return nos;
}

// Sidebar
function abrirSidebar(d, nos, arestas) {
  const sidebar = document.getElementById("sidebar");
  const content = document.getElementById("sidebar-content");

  if (d.tipo === "tema") {
    // Mostra pesquisadores conectados ao tema
    const conectados = arestas
      .filter(e => (e.source.id || e.source) === d.id || (e.target.id || e.target) === d.id)
      .map(e => {
        const oid = (e.source.id || e.source) === d.id ? (e.target.id || e.target) : (e.source.id || e.source);
        return nos.find(n => n.id === oid);
      })
      .filter(Boolean);

    content.innerHTML = `
      <div class="section-label">Tema</div>
      <h2>${d.label}</h2>
      <div class="cargo">${d.freq || 0} ocorrências no site</div>
      <div class="section-label">Pesquisadores conectados</div>
      ${conectados.map(p => `
        <div style="padding:6px 0;border-bottom:1px solid var(--border)">
          <div style="font-size:13px">${p.label}</div>
          <div style="font-size:11px;color:var(--text2)">${p.cargo || ""}</div>
        </div>
      `).join("")}
    `;
  } else {
    // Mostra perfil da pessoa
    const conexoes = arestas.filter(e =>
      ((e.source.id || e.source) === d.id || (e.target.id || e.target) === d.id) && e.tipo === "temas_comuns"
    );
    const coautorias = arestas.filter(e =>
      ((e.source.id || e.source) === d.id || (e.target.id || e.target) === d.id) && e.tipo === "coautoria"
    );

    content.innerHTML = `
      <div class="section-label">${d.grupo || "Pesquisador(a)"}</div>
      <h2>${d.label}</h2>
      <div class="cargo">${d.cargo || ""}</div>
      ${d.bio_resumo ? `<div class="bio">${d.bio_resumo}…</div>` : ""}
      ${d.temas && d.temas.length ? `
        <div class="section-label">Temas de pesquisa</div>
        <div class="tag-list">${d.temas.map(t => `<span class="tag">${t}</span>`).join("")}</div>
      ` : ""}
      ${conexoes.length ? `
        <div class="section-label">${conexoes.length} pesquisadores com temas em comum</div>
        ${conexoes.slice(0,5).map(e => {
          const oid = (e.source.id || e.source) === d.id ? (e.target.id || e.target) : (e.source.id || e.source);
          const outro = nos.find(n => n.id === oid);
          return outro ? `<div style="font-size:12px;color:var(--text2);padding:3px 0">↔ ${outro.label} (${e.temas ? e.temas.slice(0,2).join(", ") : ""})</div>` : "";
        }).join("")}
      ` : ""}
      ${coautorias.length ? `<div class="section-label">${coautorias.length} co-autorias detectadas</div>` : ""}
      ${d.n_posts ? `<div class="section-label">${d.n_posts} conteúdo(s) associado(s)</div>` : ""}
      <a href="${d.url}" target="_blank">Ver perfil completo →</a>
    `;
  }

  sidebar.classList.add("open");
}

document.getElementById("sidebar-close").onclick = () =>
  document.getElementById("sidebar").classList.remove("open");

// Filtros do grafo
document.getElementById("filtros-grafo").addEventListener("click", e => {
  if (!e.target.classList.contains("filtro-btn")) return;
  document.querySelectorAll(".filtro-btn").forEach(b => b.classList.remove("active"));
  e.target.classList.add("active");
  filtroAtivo = e.target.dataset.filtro;
  renderGrafo();
});

// ─────────────────────────────────────────────
// TIMELINE
// ─────────────────────────────────────────────
function renderTimeline() {
  const tipos = ["Todos", ...new Set(DADOS.timeline.map(t => t.tipo))];
  const filtrosEl = document.getElementById("timeline-filtros");
  filtrosEl.innerHTML = tipos.map((t, i) =>
    `<button class="timeline-filtro${i===0?" active":""}" data-tipo="${t}">${t}</button>`
  ).join("");

  filtrosEl.addEventListener("click", e => {
    if (!e.target.classList.contains("timeline-filtro")) return;
    document.querySelectorAll(".timeline-filtro").forEach(b => b.classList.remove("active"));
    e.target.classList.add("active");
    renderTimelineLista(e.target.dataset.tipo);
  });

  renderTimelineLista("Todos");
}

function renderTimelineLista(filtroTipo) {
  const lista = document.getElementById("timeline-lista");
  const itens = filtroTipo === "Todos"
    ? DADOS.timeline
    : DADOS.timeline.filter(t => t.tipo === filtroTipo);

  lista.innerHTML = itens.map((item, i) => `
    <div class="timeline-item" style="animation-delay:${i * 0.03}s">
      <div class="tl-left">
        <div class="tl-data">${formatarData(item.data)}</div>
      </div>
      <div class="tl-linha">
        <div class="tl-dot" style="background:${CORES[item.tipo] || "#7c6af7"}"></div>
        <div class="tl-bar"></div>
      </div>
      <div>
        <div class="tl-card" onclick="window.open('${item.url}','_blank')">
          <div class="tl-tipo" style="color:${CORES[item.tipo] || "#7c6af7"}">${item.tipo}</div>
          <div class="tl-titulo">${item.titulo}</div>
          ${item.temas && item.temas.length ? `
            <div class="tl-temas">
              ${item.temas.slice(0,4).map(t => `<span class="tl-tema">${t}</span>`).join("")}
            </div>` : ""}
        </div>
      </div>
    </div>
  `).join("");
}

function formatarData(d) {
  if (!d) return "";
  const dt = new Date(d);
  if (isNaN(dt)) return d;
  return dt.toLocaleDateString("pt-BR", { year:"numeric", month:"short" });
}

// ─────────────────────────────────────────────
// NUVEM DE TEMAS (D3)
// ─────────────────────────────────────────────
function renderNuvem() {
  const svg = d3.select("#nuvem-svg");
  svg.selectAll("*").remove();

  const W = document.getElementById("nuvem-svg").clientWidth;
  const H = document.getElementById("nuvem-svg").clientHeight;
  const cx = W / 2, cy = H / 2;

  const dados = DADOS.nuvem_temas.slice(0, 50);
  const maxFreq = d3.max(dados, d => d.freq);
  const escala = d3.scaleLinear().domain([1, maxFreq]).range([13, 42]);
  const escalaOp = d3.scaleLinear().domain([1, maxFreq]).range([0.5, 1]);

  const paletaCores = [
    "#7c6af7","#4ecdc4","#f7c948","#f76c6c",
    "#a8e6cf","#ffd3b6","#c9b1ff","#88d8b0"
  ];

  // Layout espiral
  const angulos = dados.map((_, i) => (i / dados.length) * Math.PI * 8);
  const raios   = dados.map((_, i) => 30 + i * 8);

  const posicoes = dados.map((d, i) => ({
    ...d,
    x: cx + raios[i] * Math.cos(angulos[i]) * (W / H),
    y: cy + raios[i] * Math.sin(angulos[i]) * 0.55,
    tamanho: escala(d.freq),
    cor: paletaCores[i % paletaCores.length],
    opacidade: escalaOp(d.freq),
  }));

  const g = svg.append("g");

  // Linhas de conexão do centro
  g.selectAll("line")
    .data(posicoes.filter((_, i) => i < 15))
    .join("line")
    .attr("x1", cx).attr("y1", cy)
    .attr("x2", d => d.x).attr("y2", d => d.y)
    .attr("stroke", d => d.cor)
    .attr("stroke-opacity", 0.08)
    .attr("stroke-width", d => d.freq / maxFreq * 3);

  // Ponto central
  g.append("circle")
    .attr("cx", cx).attr("cy", cy).attr("r", 6)
    .attr("fill", "#7c6af7").attr("opacity", 0.8);

  // Palavras
  const textos = g.selectAll("text")
    .data(posicoes)
    .join("text")
    .text(d => d.texto)
    .attr("x", d => d.x).attr("y", d => d.y)
    .attr("text-anchor", "middle")
    .attr("dominant-baseline", "central")
    .attr("font-size", d => d.tamanho + "px")
    .attr("fill", d => d.cor)
    .attr("opacity", d => d.opacidade)
    .style("cursor", "pointer")
    .on("mouseover", function(e, d) {
      d3.select(this).transition().duration(150)
        .attr("font-size", (d.tamanho * 1.3) + "px")
        .attr("opacity", 1);
    })
    .on("mouseout", function(e, d) {
      d3.select(this).transition().duration(150)
        .attr("font-size", d.tamanho + "px")
        .attr("opacity", d.opacidade);
    })
    .on("click", (e, d) => {
      // Muda para grafo e filtra pelo tema
      mudarTab("grafo");
      filtroAtivo = "tema";
      document.querySelectorAll(".filtro-btn").forEach(b => {
        b.classList.toggle("active", b.dataset.filtro === "tema");
      });
      renderGrafo();
    });

  // Animação de entrada
  textos
    .attr("transform", "scale(0)")
    .transition()
    .duration(600)
    .delay((d, i) => i * 15)
    .attr("transform", "scale(1)");
}

// ─────────────────────────────────────────────
// TABS
// ─────────────────────────────────────────────
function mudarTab(nome) {
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.tab === nome));
  document.querySelectorAll(".panel").forEach(p => p.classList.toggle("active", p.id === `panel-${nome}`));
}

document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => mudarTab(tab.dataset.tab));
});

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
carregar();
</script>
